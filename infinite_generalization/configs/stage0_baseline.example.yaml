task:
  vocab_size: 16
  target_token: 1
  eval_lengths: [10, 20, 50, 100, 200, 500, 700, 800, 850, 900, 950, 1000, 1100]
  positive_fraction: 0.5

stage:
  seed: 1234
  device: auto
  train_length: 10
  train_examples: 50000
  val_examples: 10000
  test_examples: 10000
  diagnostic_examples: 2000
  batch_size: 512
  epochs: 10
  learning_rate: 0.001
  weight_decay: 0.0
  embedding_dim: 32
  hidden_dim: 64
  output_dir: runs/stage0_maxpool_baseline
