task:
  vocab_size: 16
  target_token: 1
  eval_lengths: [10, 20, 50, 100, 200, 500, 700, 900, 1000, 1500, 2000, 5000, 10000]
  positive_fraction: 0.5

stage:
  seed: 1234
  device: auto
  train_lengths: [10, 20, 50, 100]
  train_examples_per_length: 12500
  val_examples_per_length: 2500
  test_examples: 10000
  diagnostic_examples: 2000
  batch_size: 256
  eval_batch_size: 32
  epochs: 10
  learning_rate: 0.001
  weight_decay: 0.0
  d_model: 64
  num_heads: 1
  num_layers: 1
  dim_feedforward: 128
  dropout: 0.0
  attention_variant: target_key_log_bias
  log_length_mode: log1p_length
  log_scale_init: -5.0
  target_detector: linear
  output_dir: runs/stage2b_target_key_log_bias_multilength
